name: Futu orange alert radar

on:
  workflow_dispatch:
  schedule:
    - cron: '0,30 * * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/radar.yml'
      - 'radar.js'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: write

concurrency:
  group: futu-orange-alert-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Render and extract orange alerts
        run: pnpm radar

      - name: Commit structured radar JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/processed.json

          if git diff --cached --quiet; then
            echo "Radar JSON is unchanged; nothing to commit."
            exit 0
          fi

          git commit -m "Update Futu orange alert radar"
          git pull --rebase origin main
          git push origin HEAD:main
